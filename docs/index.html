<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ask Alex — knowledge agent demo</title>
  <meta name="description" content="Ask Alex — a RAG knowledge agent over Alex Huang's engineering knowledge base. Grounded, cited, escalates to the real Alex." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'%3E%3Cpath d='M5 10h13v6a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4z' fill='none' stroke='%238a6a3e' stroke-width='2'/%3E%3Cpath d='M18 12h2.4a2.4 2.4 0 0 1 0 4.8H18' fill='none' stroke='%238a6a3e' stroke-width='2'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
  <style>
    /* Tokens mirror alex-huang.dev/src/styles/global.css — keep in sync. */
    :root, html[data-theme="light"] {
      --background: #f7f6f3; --foreground: #1a1915;
      --accent: #AF8F6F; --accent-strong: #8a6a3e; --accent-solid: #8a6a3e;
      --muted: #ece9e2; --border: #d9d5cc; --text-muted: #6b6760;
      --card: #ffffff; --card-muted: #ece9e2;
      --serif: "Source Serif 4", Georgia, serif;
      --ui: "Outfit", ui-sans-serif, system-ui, sans-serif;
      --settle: cubic-bezier(0.25, 1, 0.5, 1);
    }
    html[data-theme="dark"] {
      --background: #1c1b19; --foreground: #ebe9e0;
      --accent: #AF8F6F; --accent-strong: #c9a87c; --accent-solid: #8a6a3e;
      --muted: #2a2925; --border: #3a3835; --text-muted: #9b9690;
      --card: #2a2925; --card-muted: #161614;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--background); color: var(--foreground);
      font-family: var(--ui); line-height: 1.6; min-height: 100svh;
      display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    :focus-visible { outline: 2px solid var(--accent-strong); outline-offset: 2px; }
    button:not(:disabled) { cursor: pointer; }

    .theme { position: fixed; top: 1rem; right: 1.1rem; z-index: 20; width: 38px; height: 38px;
      display: grid; place-items: center; background: transparent; border: 1px solid var(--border);
      border-radius: 999px; color: var(--text-muted); font-size: 1rem;
      transition: border-color 0.3s var(--settle), color 0.3s var(--settle); }
    .theme:hover { border-color: var(--accent); color: var(--foreground); }

    .gallery { position: relative; width: 100%; max-width: 760px; margin: 0 auto;
      padding: 3.2rem 1.25rem 2rem; flex: 1; display: flex; flex-direction: column; }
    /* the engraving recedes behind the hero as ghosted texture */
    .ghost { position: absolute; top: 0.5rem; left: 50%; transform: translateX(-50%);
      width: min(520px, 88%); aspect-ratio: 3 / 2; background: var(--accent); opacity: 0.15;
      -webkit-mask: url("armchair-engraving.png") center / contain no-repeat;
      mask: url("armchair-engraving.png") center / contain no-repeat; pointer-events: none; }
    html[data-theme="dark"] .ghost { opacity: 0.11; }

    .hero-c3 { position: relative; z-index: 1; text-align: center; padding: 1.2rem 0 0.4rem; }
    .eyebrow { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--accent-strong); }
    h1.display { margin: 0.9rem 0 0; font-family: var(--serif); font-weight: 400;
      font-size: clamp(2.7rem, 9vw, 4.5rem); line-height: 0.98; letter-spacing: -0.02em; }
    .tagline { margin: 1.1rem auto 0; max-width: 28rem; font-family: var(--serif); font-style: italic;
      font-size: 1rem; line-height: 1.65; color: var(--text-muted); }

    /* placard chat surface with corner ticks */
    .placard { position: relative; z-index: 1; display: flex; flex-direction: column;
      flex: 1; min-height: min(560px, 66vh); margin-top: 1.4rem;
      background: var(--card); border: 1px solid var(--border); }
    .tick { position: absolute; width: 14px; height: 14px; z-index: 2; pointer-events: none; }
    .placard::before, .placard::after { content: ""; position: absolute; width: 14px; height: 14px; z-index: 2; }
    .placard::before { top: -1px; left: -1px; border-top: 1.5px solid var(--accent); border-left: 1.5px solid var(--accent); }
    .placard::after { top: -1px; right: -1px; border-top: 1.5px solid var(--accent); border-right: 1.5px solid var(--accent); }
    .tick-bl { bottom: -1px; left: -1px; border-bottom: 1.5px solid var(--accent); border-left: 1.5px solid var(--accent); }
    .tick-br { bottom: -1px; right: -1px; border-bottom: 1.5px solid var(--accent); border-right: 1.5px solid var(--accent); }

    #log { flex: 1; overflow-y: auto; padding: 1.3rem 1.4rem; display: flex; flex-direction: column;
      gap: 0.85rem; counter-reset: turn; }
    .msg { animation: msg-in 0.35s var(--settle) both; }
    @keyframes msg-in { from { opacity: 0; transform: translateY(8px); } }
    .msg.user { counter-increment: turn; padding-top: 0.3rem; }
    .msg.user:not(:first-child) { margin-top: 0.55rem; border-top: 1px solid var(--border); padding-top: 1.15rem; }
    .msg.user::before { content: "No. " counter(turn, decimal-leading-zero); display: block;
      margin-bottom: 0.35rem; font-size: 0.58rem; font-weight: 600; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--text-muted); }
    .msg.user .body { font-family: var(--serif); font-size: 1.18rem; line-height: 1.35; letter-spacing: -0.01em; }
    .body { font-family: var(--serif); font-size: 0.97rem; line-height: 1.7; }
    .body .bean { color: var(--accent); font-size: 0.6em; vertical-align: 0.28em; margin-right: 0.3rem; }
    .body code { background: var(--card-muted); padding: 0.08rem 0.3rem; border-radius: 5px;
      font-family: ui-monospace, monospace; font-size: 0.85em; }
    .body sup { font-family: var(--ui); font-size: 0.62em; font-weight: 600; color: var(--accent-strong); }
    .cursor::after { content: ""; display: inline-block; width: 0.5rem; height: 1rem;
      vertical-align: text-bottom; background: var(--accent); margin-left: 2px;
      animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* provenance */
    .sources { margin-top: 0.9rem; border-top: 1px solid var(--border); padding-top: 0.55rem;
      animation: msg-in 0.35s var(--settle) both; }
    .sources::before { content: "Provenance"; display: block; margin-bottom: 0.32rem;
      font-size: 0.56rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted); }
    .prov { display: flex; align-items: baseline; gap: 0.45rem; margin: 0.18rem 0;
      font-size: 0.82rem; font-family: var(--ui); }
    .prov-n { flex: none; font-weight: 600; font-size: 0.68rem; color: var(--accent-strong); }
    .prov-t { font-family: var(--serif); line-height: 1.45; }
    .prov-cat { color: var(--text-muted); }

    .escalation { margin-top: 0.7rem; border-left: 3px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      padding: 0.55rem 0.75rem; font-size: 0.88rem; font-family: var(--ui); line-height: 1.5; }
    .escalation a { color: var(--accent-strong); }
    .escalation small { color: var(--text-muted); }

    /* empty state — the engraving anchor */
    .hero { margin: auto; display: flex; flex-direction: column; align-items: center; gap: 1rem;
      text-align: center; color: var(--text-muted); animation: msg-in 0.5s var(--settle) both; }
    .hero-art { width: min(300px, 70%); aspect-ratio: 3 / 2; background: var(--accent);
      -webkit-mask: url("armchair-engraving.png") center / contain no-repeat;
      mask: url("armchair-engraving.png") center / contain no-repeat; }
    .hero-line { font-family: var(--serif); font-style: italic; font-size: 1.08rem; max-width: 22rem; margin: 0; }
    .hero-cap { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase; margin: 0; }

    /* suggestions + input */
    #suggest { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.45rem;
      border-top: 1px solid var(--border); padding: 0.7rem 1rem 0; }
    #suggest button { font-family: var(--ui); font-size: 0.64rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--foreground);
      background: var(--card); border: 1px solid var(--border); border-radius: 999px;
      padding: 0.4rem 0.75rem; transition: border-color 0.2s var(--settle), transform 0.2s var(--settle); }
    #suggest button:hover { border-color: var(--accent); transform: translateY(-1px); }
    .ask-label { margin: 0; padding: 0.75rem 1rem 0; text-align: center; font-size: 0.6rem;
      font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase; color: var(--accent-strong); }
    #form { display: flex; justify-content: center; gap: 0.5rem; padding: 0.55rem 1rem 1.1rem; }
    #input { flex: 1; max-width: 25rem; font-family: var(--ui); font-size: 0.95rem;
      color: var(--foreground); background: var(--card); border: 1px solid var(--border);
      border-radius: 999px; padding: 0.6rem 1.1rem;
      transition: border-color 0.2s var(--settle), box-shadow 0.2s var(--settle); }
    #input::placeholder { color: var(--text-muted); }
    #input:focus { outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); }
    #send { font-family: var(--ui); font-size: 0.68rem; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: #fff; background: var(--accent-solid); border: none;
      border-radius: 999px; padding: 0 1.35rem;
      transition: transform 0.2s var(--settle), opacity 0.2s; }
    #send:hover { transform: translateY(-1px); }
    #send:disabled { opacity: 0.5; transform: none; }

    footer { text-align: center; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text-muted); padding: 1.1rem 1rem 1.4rem; }
    footer a { color: var(--accent-strong); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      #form { flex-direction: column; }
      #input { max-width: none; }
      #send { padding: 0.7rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .msg, .sources, .hero { animation: none !important; }
      .cursor::after { animation: none !important; }
    }
  </style>
</head>
<body>
  <button class="theme" id="theme" aria-label="Toggle light or dark theme" title="Toggle theme">☾</button>

  <div class="gallery">
    <div class="ghost" aria-hidden="true"></div>

    <header class="hero-c3">
      <p class="eyebrow">Knowledge Agent · Melbourne</p>
      <h1 class="display">Ask Alex</h1>
      <p class="tagline">Answers about Alex Huang's work — each grounded in a curated
        knowledge base, each with its provenance on record.</p>
    </header>

    <main class="placard">
      <span class="tick tick-bl" aria-hidden="true"></span>
      <span class="tick tick-br" aria-hidden="true"></span>
      <div id="log">
        <div class="hero" id="hero">
          <span class="hero-art" aria-hidden="true"></span>
          <p class="hero-line">Pull up a chair — ask me anything.</p>
          <p class="hero-cap" aria-hidden="true">Grounded · Cited · Est. 2026</p>
        </div>
      </div>
      <div id="suggest">
        <button type="button">Who is Alex?</button>
        <button type="button">Why hire Alex?</button>
        <button type="button">AI in production?</button>
        <button type="button">Salesforce at scale?</button>
      </div>
      <p class="ask-label" aria-hidden="true">Ask your own</p>
      <form id="form">
        <input id="input" type="text" placeholder="Ask about Alex's work, principles, or engineering…"
          autocomplete="off" aria-label="Ask a question" />
        <button id="send" type="submit">Ask</button>
      </form>
    </main>
  </div>

  <footer>
    Grounded · Cited · Built by Alex Huang ·
    <a href="https://alex-huang.dev" target="_blank" rel="noopener">alex-huang.dev</a>
  </footer>

  <script>
    const BACKEND = "https://kb-agent-732809775240.us-central1.run.app/chat";
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const themeBtn = document.getElementById("theme");
    const history = [];

    // Theme toggle (icon reflects the action's target state)
    function syncThemeIcon() {
      themeBtn.textContent = document.documentElement.dataset.theme === "dark" ? "☀" : "☾";
    }
    themeBtn.onclick = () => {
      const r = document.documentElement;
      r.dataset.theme = r.dataset.theme === "dark" ? "light" : "dark";
      syncThemeIcon();
    };
    syncThemeIcon();

    // Suggested questions (delegated; hero is removed on first submit)
    const suggest = document.getElementById("suggest");
    if (suggest) {
      suggest.addEventListener("click", (e) => {
        if (e.target.tagName === "BUTTON") { input.value = e.target.textContent; form.requestSubmit(); }
      });
    }
    function clearHero() {
      const hero = document.getElementById("hero");
      if (hero) hero.remove();
    }

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function fmt(s) {
      return esc(s)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[(\d+)\]/g, "<sup>[$1]</sup>")
        .replace(/\n/g, "<br>");
    }
    function bubble(role) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      const bean = role === "alex" ? '<span class="bean" aria-hidden="true">&#9679;</span>' : "";
      el.innerHTML = "<div class='body'>" + bean + "</div>";
      log.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
      return el;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || send.disabled) return;
      clearHero();
      input.value = ""; send.disabled = true;
      bubble("user").querySelector(".body").textContent = text;
      history.push({ role: "user", text });

      const el = bubble("alex");
      const body = el.querySelector(".body");
      body.classList.add("cursor");
      let answer = "";

      try {
        const res = await fetch(BACKEND, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const parts = buf.split("\n\n");
          buf = parts.pop();
          for (const part of parts) {
            const line = part.split("\n").find((l) => l.startsWith("data:"));
            if (!line) continue;
            const ev = JSON.parse(line.slice(5).trim());
            if (ev.type === "delta") { answer += ev.text; body.innerHTML = fmt(answer); }
            else if (ev.type === "sources" && ev.sources.length) {
              const s = document.createElement("div");
              s.className = "sources";
              s.innerHTML = ev.sources.map((x) =>
                "<span class='prov'><span class='prov-n'>" + x.n + "</span>" +
                "<span class='prov-t'>" + esc(x.title) +
                (x.category ? "<span class='prov-cat'> · " + esc(x.category) + "</span>" : "") +
                "</span></span>").join("");
              el.appendChild(s);
            } else if (ev.type === "escalation") {
              const d = document.createElement("div");
              d.className = "escalation";
              d.innerHTML = "This is outside what I can answer from the knowledge base. " +
                "To reach Alex directly, get in touch via <a href='https://alex-huang.dev' target='_blank' rel='noopener'>alex-huang.dev</a>." +
                "<br><small>" + esc(ev.summary || "") + "</small>";
              el.appendChild(d);
            } else if (ev.type === "error") { answer += "\n\n[error: " + ev.message + "]"; body.innerHTML = fmt(answer); }
          }
          el.scrollIntoView({ behavior: "smooth", block: "end" });
        }
      } catch (err) {
        body.innerHTML = fmt("Something went wrong reaching the agent: " + err.message);
      } finally {
        body.classList.remove("cursor");
        if (answer) history.push({ role: "model", text: answer });
        send.disabled = false; input.focus();
      }
    });
  </script>
</body>
</html>
