<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ask Alex</title>
  <meta name="description" content="Ask Alex — a knowledge agent over Alex Huang's engineering knowledge base." />
  <style>
    :root {
      --bg: #faf8f5; --fg: #1c1a17; --muted: #6b655d; --accent: #af8f6f;
      --card: #fff; --border: #e7e1d8; --user: #efe7dc; --code: #f2ede5;
    }
    html[data-theme="dark"] {
      --bg: #16140f; --fg: #ece7df; --muted: #9a9389; --accent: #c8a982;
      --card: #1f1c16; --border: #322d25; --user: #2a251d; --code: #221f19;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    header {
      padding: 1.4rem 1.2rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: .8rem; flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.5rem; letter-spacing: -.01em; }
    header p { margin: 0; color: var(--muted); font-size: .92rem; }
    .theme { margin-left: auto; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; padding: .3rem .6rem; cursor: pointer; font-size: .85rem; }
    main { flex: 1; width: 100%; max-width: 760px; margin: 0 auto; padding: 1.2rem;
      display: flex; flex-direction: column; gap: 1rem; }
    #log { display: flex; flex-direction: column; gap: 1rem; flex: 1; }
    .msg { padding: .8rem 1rem; border-radius: 12px; max-width: 100%; }
    .msg.user { background: var(--user); align-self: flex-end; max-width: 85%; }
    .msg.alex { background: var(--card); border: 1px solid var(--border); }
    .msg .who { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--accent); margin-bottom: .3rem; font-weight: 600; }
    .msg pre { background: var(--code); padding: .2rem .4rem; border-radius: 6px;
      overflow-x: auto; font-size: .9em; }
    .msg code { background: var(--code); padding: .1rem .3rem; border-radius: 4px; font-size: .9em; }
    .sources { margin-top: .6rem; display: flex; flex-wrap: wrap; gap: .4rem; }
    .chip { font-size: .74rem; color: var(--muted); border: 1px solid var(--border);
      border-radius: 999px; padding: .15rem .55rem; background: var(--bg); }
    .escalation { margin-top: .6rem; border-left: 3px solid var(--accent);
      background: var(--code); padding: .6rem .8rem; border-radius: 6px; font-size: .92rem; }
    .escalation a { color: var(--accent); }
    .suggest { display: flex; flex-wrap: wrap; gap: .5rem; }
    .suggest button { background: var(--card); border: 1px solid var(--border); color: var(--fg);
      border-radius: 999px; padding: .4rem .8rem; cursor: pointer; font-size: .85rem; }
    .suggest button:hover { border-color: var(--accent); }
    form { display: flex; gap: .6rem; position: sticky; bottom: 0;
      background: var(--bg); padding: .8rem 0; }
    input[type=text] { flex: 1; padding: .7rem .9rem; border: 1px solid var(--border);
      border-radius: 10px; background: var(--card); color: var(--fg); font-size: 1rem; }
    button.send { background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 0 1.1rem; cursor: pointer; font-weight: 600; }
    button.send:disabled { opacity: .5; cursor: default; }
    footer { text-align: center; color: var(--muted); font-size: .8rem; padding: 1rem; }
    footer a { color: var(--accent); }
    .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 0%,50% { opacity: 1 } 50.01%,100% { opacity: 0 } }
  </style>
</head>
<body>
  <header>
    <h1>Ask Alex</h1>
    <p>A knowledge agent over Alex Huang's engineering knowledge base.</p>
    <button class="theme" id="theme">Theme</button>
  </header>
  <main>
    <div id="log"></div>
    <div class="suggest" id="suggest">
      <button>Who is Alex?</button>
      <button>What are Alex's engineering principles?</button>
      <button>How does Alex approach RAG and agentic AI?</button>
      <button>How does Alex run releases?</button>
      <button>How do I fix UNABLE_TO_LOCK_ROW in Apex?</button>
    </div>
    <form id="form">
      <input type="text" id="input" placeholder="Ask about Alex's work, principles, or engineering…" autocomplete="off" />
      <button class="send" id="send" type="submit">Ask</button>
    </form>
  </main>
  <footer>
    Grounded in a curated knowledge base · built by Alex Huang ·
    <a href="https://alex-huang.dev" target="_blank" rel="noopener">alex-huang.dev</a>
  </footer>

  <script>
    const BACKEND = "https://kb-agent-732809775240.us-central1.run.app/chat";
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const history = [];

    // Theme toggle
    document.getElementById("theme").onclick = () => {
      const r = document.documentElement;
      r.dataset.theme = r.dataset.theme === "dark" ? "light" : "dark";
    };

    document.getElementById("suggest").addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON") { input.value = e.target.textContent; form.requestSubmit(); }
    });

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function fmt(s) {
      return esc(s)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br>");
    }
    function bubble(role) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.innerHTML = '<div class="who">' + (role === "user" ? "You" : "Alex") + "</div><div class='body'></div>";
      log.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
      return el;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = ""; send.disabled = true;
      bubble("user").querySelector(".body").textContent = text;
      history.push({ role: "user", text });

      const el = bubble("alex");
      const body = el.querySelector(".body");
      body.classList.add("cursor");
      let answer = "";

      try {
        const res = await fetch(BACKEND, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const parts = buf.split("\n\n");
          buf = parts.pop();
          for (const part of parts) {
            const line = part.split("\n").find((l) => l.startsWith("data:"));
            if (!line) continue;
            const ev = JSON.parse(line.slice(5).trim());
            if (ev.type === "delta") { answer += ev.text; body.innerHTML = fmt(answer); }
            else if (ev.type === "sources" && ev.sources.length) {
              const s = document.createElement("div");
              s.className = "sources";
              s.innerHTML = ev.sources.map((x) => '<span class="chip">[' + x.n + "] " + esc(x.title) + "</span>").join("");
              el.appendChild(s);
            } else if (ev.type === "escalation") {
              const d = document.createElement("div");
              d.className = "escalation";
              d.innerHTML = "This is outside what I can answer from the knowledge base. " +
                "To reach Alex directly, get in touch via <a href='https://alex-huang.dev' target='_blank' rel='noopener'>alex-huang.dev</a>." +
                "<br><small>" + esc(ev.summary || "") + "</small>";
              el.appendChild(d);
            } else if (ev.type === "error") { answer += "\n\n[error: " + ev.message + "]"; body.innerHTML = fmt(answer); }
          }
          el.scrollIntoView({ behavior: "smooth", block: "end" });
        }
      } catch (err) {
        body.innerHTML = fmt("Something went wrong reaching the agent: " + err.message);
      } finally {
        body.classList.remove("cursor");
        if (answer) history.push({ role: "model", text: answer });
        send.disabled = false; input.focus();
      }
    });
  </script>
</body>
</html>
