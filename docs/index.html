<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ask Alex</title>
  <meta name="description" content="Ask Alex — a knowledge agent over Alex Huang's engineering knowledge base." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg fill='none' stroke='%238a6d4f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M9 6c-1 1.4-1 2.6 0 4M16 6c-1 1.4-1 2.6 0 4'/%3E%3Cpath d='M6 13h15v8a5 5 0 0 1-5 5h-5a5 5 0 0 1-5-5z'/%3E%3Cpath d='M21 15h2.5a3 3 0 0 1 0 6H21'/%3E%3C/g%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #faf8f5; --fg: #1c1a17; --muted: #6b655d; --accent: #af8f6f;
      --accent-strong: #8a6d4f; --card: #fff; --border: #e7e1d8;
      --user: #efe7dc; --code: #f2ede5; --ring: #b88f63;
    }
    html[data-theme="dark"] {
      --bg: #16140f; --fg: #ece7df; --muted: #9a9389; --accent: #c8a982;
      --accent-strong: #d8bd95; --card: #1f1c16; --border: #322d25;
      --user: #2a251d; --code: #221f19; --ring: #c8a982;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    :focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }

    header {
      padding: 1.1rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .65rem;
    }
    .logo { width: 30px; height: 30px; flex: none; color: var(--accent-strong); }
    .brand { display: flex; flex-direction: column; gap: .1rem; }
    header h1 { margin: 0; font-size: 1.18rem; letter-spacing: -.01em; line-height: 1.1; }
    header p { margin: 0; color: var(--muted); font-size: .8rem; }
    .theme { margin-left: auto; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 9px; width: 36px; height: 36px; cursor: pointer;
      display: grid; place-items: center; font-size: 1rem; line-height: 1; }
    .theme:hover { border-color: var(--accent); color: var(--fg); }

    main { flex: 1; width: 100%; max-width: 760px; margin: 0 auto; padding: 1.2rem;
      display: flex; flex-direction: column; gap: 1rem; }
    #log { display: flex; flex-direction: column; gap: 1rem; flex: 1; }

    /* Empty-state hero */
    .hero { margin: auto 0; text-align: center; display: flex; flex-direction: column;
      align-items: center; gap: 1.1rem; padding: 2rem 0 1rem; }
    .hero .logo { width: 52px; height: 52px; }
    .hero h2 { margin: 0; font-size: 1.25rem; font-weight: 600; letter-spacing: -.01em; }
    .hero p { margin: 0; color: var(--muted); font-size: .95rem; max-width: 30rem; }

    .msg { padding: .75rem 1rem; border-radius: 14px; max-width: 100%; }
    .msg.user { background: var(--user); align-self: flex-end; max-width: 85%; }
    .msg.alex { background: var(--card); border: 1px solid var(--border); position: relative; }
    .msg.alex .body { display: block; }
    .msg.alex .bean { color: var(--accent); margin-right: .4rem; }
    .msg pre { background: var(--code); padding: .7rem .8rem; border-radius: 8px;
      overflow-x: auto; font-size: .9em; }
    .msg code { background: var(--code); padding: .1rem .3rem; border-radius: 4px; font-size: .9em; }
    .sources { margin-top: .7rem; display: flex; flex-wrap: wrap; gap: .4rem; }
    .chip { font-size: .74rem; color: var(--muted); border: 1px solid var(--border);
      border-radius: 999px; padding: .15rem .55rem; background: var(--bg); }
    .escalation { margin-top: .7rem; border-left: 3px solid var(--accent);
      background: var(--code); padding: .6rem .8rem; border-radius: 6px; font-size: .92rem; }
    .escalation a { color: var(--accent-strong); }

    .suggest { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; }
    .suggest button { background: var(--card); border: 1px solid var(--border); color: var(--fg);
      border-radius: 999px; padding: .45rem .85rem; cursor: pointer; font-size: .85rem;
      text-align: left; transition: border-color .15s, background .15s; }
    .suggest button:hover { border-color: var(--accent); background: var(--bg); }

    form { display: flex; gap: .6rem; position: sticky; bottom: 0;
      background: var(--bg); padding: .8rem 0; }
    input[type=text] { flex: 1; padding: .72rem .95rem; border: 1px solid var(--border);
      border-radius: 11px; background: var(--card); color: var(--fg); font-size: 1rem; }
    input[type=text]::placeholder { color: var(--muted); }
    button.send { background: var(--accent-strong); color: #fff; border: none; border-radius: 11px;
      padding: 0 1.2rem; cursor: pointer; font-weight: 600; }
    button.send:hover { filter: brightness(1.06); }
    button.send:disabled { opacity: .5; cursor: default; }
    html[data-theme="dark"] button.send { color: #16140f; }

    footer { text-align: center; color: var(--muted); font-size: .8rem; padding: 1rem; }
    footer a { color: var(--accent-strong); }
    .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 0%,50% { opacity: 1 } 50.01%,100% { opacity: 0 } }
  </style>
</head>
<body>
  <header>
    <!-- steaming coffee mug -->
    <svg class="logo" viewBox="0 0 32 32" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 6c-1 1.4-1 2.6 0 4M16 6c-1 1.4-1 2.6 0 4" />
      <path d="M6 13h15v8a5 5 0 0 1-5 5h-5a5 5 0 0 1-5-5z" />
      <path d="M21 15h2.5a3 3 0 0 1 0 6H21" />
    </svg>
    <div class="brand">
      <h1>Ask Alex</h1>
      <p>A knowledge agent over Alex Huang's work.</p>
    </div>
    <button class="theme" id="theme" aria-label="Toggle light or dark theme" title="Toggle theme">☾</button>
  </header>

  <main>
    <div id="log">
      <div class="hero" id="hero">
        <svg class="logo" viewBox="0 0 32 32" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 6c-1 1.4-1 2.6 0 4M16 6c-1 1.4-1 2.6 0 4" />
          <path d="M6 13h15v8a5 5 0 0 1-5 5h-5a5 5 0 0 1-5-5z" />
          <path d="M21 15h2.5a3 3 0 0 1 0 6H21" />
        </svg>
        <h2>Grab a coffee and ask Alex</h2>
        <p>Ask about Alex — his work, how he builds, and what he's after next. Grounded in a curated knowledge base.</p>
        <div class="suggest" id="suggest">
          <button>What roles is Alex targeting, and why the move to FDE / Applied AI?</button>
          <button>What has Alex actually shipped with AI in production — not demos?</button>
          <button>Can Alex own delivery end-to-end, solo, across regions?</button>
          <button>How does Alex keep a live Salesforce org stable under pressure?</button>
          <button>How does Alex turn vague requirements into shipped solutions?</button>
          <button>What makes Alex different from a typical Salesforce developer?</button>
        </div>
      </div>
    </div>

    <form id="form">
      <input type="text" id="input" placeholder="Ask about Alex's work, principles, or engineering…" autocomplete="off" />
      <button class="send" id="send" type="submit">Ask</button>
    </form>
  </main>

  <footer>
    Grounded in a curated knowledge base · built by Alex Huang ·
    <a href="https://alex-huang.dev" target="_blank" rel="noopener">alex-huang.dev</a>
  </footer>

  <script>
    const BACKEND = "https://kb-agent-732809775240.us-central1.run.app/chat";
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const themeBtn = document.getElementById("theme");
    const history = [];

    // Theme toggle (icon reflects the action's target state)
    function syncThemeIcon() {
      themeBtn.textContent = document.documentElement.dataset.theme === "dark" ? "☀" : "☾";
    }
    themeBtn.onclick = () => {
      const r = document.documentElement;
      r.dataset.theme = r.dataset.theme === "dark" ? "light" : "dark";
      syncThemeIcon();
    };
    syncThemeIcon();

    // Suggested questions (delegated; hero is removed on first submit)
    const suggest = document.getElementById("suggest");
    if (suggest) {
      suggest.addEventListener("click", (e) => {
        if (e.target.tagName === "BUTTON") { input.value = e.target.textContent; form.requestSubmit(); }
      });
    }
    function clearHero() {
      const hero = document.getElementById("hero");
      if (hero) hero.remove();
    }

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function fmt(s) {
      return esc(s)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br>");
    }
    function bubble(role) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      const bean = role === "alex" ? '<span class="bean" aria-hidden="true">&#9679;</span>' : "";
      el.innerHTML = "<div class='body'>" + bean + "</div>";
      log.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
      return el;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      clearHero();
      input.value = ""; send.disabled = true;
      bubble("user").querySelector(".body").textContent = text;
      history.push({ role: "user", text });

      const el = bubble("alex");
      const body = el.querySelector(".body");
      body.classList.add("cursor");
      let answer = "";

      try {
        const res = await fetch(BACKEND, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const parts = buf.split("\n\n");
          buf = parts.pop();
          for (const part of parts) {
            const line = part.split("\n").find((l) => l.startsWith("data:"));
            if (!line) continue;
            const ev = JSON.parse(line.slice(5).trim());
            if (ev.type === "delta") { answer += ev.text; body.innerHTML = fmt(answer); }
            else if (ev.type === "sources" && ev.sources.length) {
              const s = document.createElement("div");
              s.className = "sources";
              s.innerHTML = ev.sources.map((x) => '<span class="chip">[' + x.n + "] " + esc(x.title) + "</span>").join("");
              el.appendChild(s);
            } else if (ev.type === "escalation") {
              const d = document.createElement("div");
              d.className = "escalation";
              d.innerHTML = "This is outside what I can answer from the knowledge base. " +
                "To reach Alex directly, get in touch via <a href='https://alex-huang.dev' target='_blank' rel='noopener'>alex-huang.dev</a>." +
                "<br><small>" + esc(ev.summary || "") + "</small>";
              el.appendChild(d);
            } else if (ev.type === "error") { answer += "\n\n[error: " + ev.message + "]"; body.innerHTML = fmt(answer); }
          }
          el.scrollIntoView({ behavior: "smooth", block: "end" });
        }
      } catch (err) {
        body.innerHTML = fmt("Something went wrong reaching the agent: " + err.message);
      } finally {
        body.classList.remove("cursor");
        if (answer) history.push({ role: "model", text: answer });
        send.disabled = false; input.focus();
      }
    });
  </script>
</body>
</html>
